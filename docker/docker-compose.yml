services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sinhala_learn_user}:${POSTGRES_PASSWORD:-sinlearn}@postgres:5432/${POSTGRES_DB:-SinhalaLearn}
      ENV: ${ENV:-development}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - postgres

  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sinhala_learn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sinlearn}
      POSTGRES_DB: ${POSTGRES_DB:-SinhalaLearn}
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
volumes:
  pg_data:
